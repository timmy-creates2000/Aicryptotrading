services:
  - type: web
    name: simple-crypto-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.simple.txt
    startCommand: python simple_bot.py
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
